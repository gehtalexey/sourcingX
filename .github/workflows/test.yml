name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege: read-only on the repo, no write access to anything else.
# Any future job that needs to write (e.g. publish) must be added narrowly.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Syntax check (lightweight lint)
        # Compile every tracked .py file. Catches syntax/import errors across
        # the whole repo without requiring a full lint toolchain.
        run: python -m compileall -q .

      - name: Run focused tests
        env:
          # Placeholder keys prevent tests from accidentally calling real APIs.
          # Real secrets must NEVER be inlined here — use repo Actions secrets.
          OPENAI_API_KEY: "test-key"
          CRUSTDATA_API_KEY: "test-key"
        run: |
          pytest -v --tb=short \
            test_mocking_services.py \
            test_screening_parameterized.py \
            test_profiles_status_dropped.py \
            test_company_filter_matching.py \
            test_hard_constraints_prompt.py \
            test_screening_policy_consolidation.py \
            test_tenure_constraint_override.py \
            test_pick_current_employer.py \
            test_ai_screen_excludes_army.py \
            test_helpers_extract_display_fields.py \
            test_db_search_ai_expansion.py \
            test_db_search_company_substring.py \
            test_geo_aware_ai_expansion.py \
            test_api_key_strip.py \
            test_filter_funnel_breakdown.py \
            test_csv_upload_clears_derived_state.py \
            test_crustdata_title_variants.py \
            test_crustdata_semantic_search.py \
            test_db_full_details_export.py \
            test_search_full_details_export.py \
            test_normalize_current_tenure.py \
            test_passed_email_split.py \
            test_geo_terms.py \
            test_db_similarity_rpc.py \
            test_similar_profiles_auto_enrich.py \
            test_people_search_history.py \
            test_crustdata_v2_search.py \
            test_crustdata_batch_enrich.py \
            test_enrich_thin_profiles_integration.py
